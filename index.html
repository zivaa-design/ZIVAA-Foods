<html lang="en">

</head>
<body>

<div class="menu" onclick="openMenu()">☰</div>

</div>

<div class="icons">
<span>🔍</span>
<span>👤</span>
<span>🛒</span>
</div>

</header>

<div class="side-menu" id="sideMenu">

<div class="menu-header">
<span class="close-btn" onclick="closeMenu()">✕</span>
</div>

<a href="#">Home</a>
<a href="#">Orders</a>
<a href="#">Track your order</a>
<a href="#">Products</a>
<a href="#">Return Policy</a>
<a href="#">About us</a>
<a href="#">Contact us</a>
<a href="#">Shipping Policy</a>
<a href="#">Terms of Service</a>

<div class="menu-bottom">

<a href="#" class="login-link">
<img src="login.png" class="social-icon">
<span>Log in</span>
</a>

<a href="#">
<img src="facebook.jpg" class="social-icon">
</a>

<a href="#">
<img src="instagram.jpg" class="social-icon">
</a>

<a href="#">
<img src="youtube.png" class="social-icon">
</a>

</div>

</div>
  
<div class="tagline-box">
  <h2>Traditional Indian Delights</h2>
</div>  
  
<div class="banner-container">

<div class="slider-wrapper">

<div class="slider-track" id="sliderTrack">

<img src="zivaa1.jpg" alt="Banner 1">
<img src="zivaa2.jpg" alt="Banner 2">
<img src="zivaa3.jpg" alt="Banner 3">
<img src="zivaa4.jpg" alt="Banner 4">
<img src="zivaa5.jpg" alt="Banner 5">

</div>

</div>

<div class="slider-dots" id="sliderDots"></div>

</div>

<div class="products-section">

<h2>OUR PRODUCTS</h2>

<p>A heritage of flavor in every bite.</p>

<div class="product-grid">

<div class="product-card">
<img src="product1.jpg" alt="Product 1">
</div>

<div class="product-card">
<img src="product2.jpg" alt="Product 2">
</div>

<div class="product-card">
<img src="product3.jpg" alt="Product 3">
</div>

</div>

<a href="#" class="view-products-btn">View Products</a>

</div>

<div class="our-products">

    <h2>OUR PRODUCTS</h2>

    <!-- Top 5 Laddus -->
    <div class="laddu-row">
        <img src="laddu-row.png" alt="5 Coconut Laddus">
    </div>

    <!-- Dialogue + Girl -->
    <div class="content-row">

        <!-- Left Side Dialogue -->
        <div class="dialogue">

            <p class="bn">
                দাদা একটা<br>
                লাড্ডু নাও না...
            </p>

            <p class="hi">
                भैया,<br>
                एक लड्डू<br>
                टेस्ट कीजिए! 😊
            </p>

        </div>

        <!-- Right Side Window Girl -->
        <div class="animation-area">

            <img src="window-girl.png"
                 class="girl-window"
                 alt="Window Girl">

            <!-- Hidden Laddu for Animation -->
            <img src="single-laddu.png"
                 class="moving-laddu"
                 alt="Single Laddu">

        </div>

    </div>

    <!-- Product Packet -->
    <div class="packet-area">

        <img src="zivaa-packet.png"
             class="packet"
             alt="ZIVAA Foods Coconut Laddu">

    </div>

</div>
  
<script>

const track = document.getElementById("sliderTrack");
const dotsContainer = document.getElementById("sliderDots");

const slides = track.querySelectorAll("img");
let current = 0;

slides.forEach((_, i) => {
const dot = document.createElement("div");
dot.classList.add("dot");
if(i === 0) dot.classList.add("active");
dotsContainer.appendChild(dot);
});

const dots = document.querySelectorAll(".dot");

function showSlide(index){
track.style.transform = `translateX(-${index * 100}%)`;

dots.forEach(dot => dot.classList.remove("active"));
dots[index].classList.add("active");
}

setInterval(() => {
current++;
if(current >= slides.length){
current = 0;
}
showSlide(current);
}, 5000);

function openMenu(){
document.getElementById("sideMenu").classList.add("active");
}

function closeMenu(){
document.getElementById("sideMenu").classList.remove("active");
}
  
</script>

</body>
</html>
